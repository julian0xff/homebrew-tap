name: Update Cask

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 0.3.0)"
        required: true
        type: string
      sha256:
        description: "SHA256 hash of the DMG"
        required: true
        type: string

jobs:
  update:
    name: Update Dictava Cask
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update cask formula
        env:
          VERSION: ${{ github.event.inputs.version }}
          SHA256: ${{ github.event.inputs.sha256 }}
        run: |
          echo "Updating dictava to ${VERSION} (sha256: ${SHA256})"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/dictava.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/dictava.rb
          cat Casks/dictava.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/dictava.rb
          git commit -m "Update dictava to ${{ github.event.inputs.version }}"
          git push origin main
